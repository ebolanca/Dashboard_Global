<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="pc-switcher">
            <a href="http://100.95.217.45:4000" id="tab-omen" class="pc-tab">
                <i class="fa-solid fa-server"></i> OMEN
            </a>
            <a href="http://localhost:4000" id="tab-msi" class="pc-tab">
                <i class="fa-solid fa-laptop"></i> MSI
            </a>
        </div>
        <h1>Dashboard <span id="pc-name-display">...</span></h1>
    </header>

    <main class="container">
        <section class="dashboard-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fa-solid fa-code-branch"></i> Proyectos GitHub</h2>
                <button class="btn-sync-all" onclick="window.syncAllProjects()" id="btn-sync-all">
                    <i class="fa-solid fa-rotate"></i> Sincronizar Todo
                </button>
            </div>
            <div class="grid" id="projects-grid">
                <div class="card loading"><div class="spinner"></div></div>
            </div>
        </section>

        <section class="dashboard-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fa-solid fa-robot"></i> Bots Activos (PM2)</h2>
            </div>
            <div class="grid" id="bots-grid">
                <div class="card loading"><div class="spinner"></div></div>
            </div>
        </section>
    </main>

    <!-- Modal Bot Logs -->
    <div id="bot-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3>Logs: <span id="modal-bot-name"></span></h3>
            </div>
            <div class="modal-body" id="bot-logs-content" style="font-family: monospace; font-size: 0.85rem; background: #0f172a; padding: 1.5rem; border-radius: 16px; max-height: 400px; overflow-y: auto;">
                <!-- Logs here -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="window.closeBotModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
